#timerBox svg{transform:rotate(-90deg);}

.highlight {color:gold;font-weight:bold;}
#celebration{font-size:28px;color:gold;margin-top:10px;}
#gameOverBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:black;padding:15px;border-radius:10px;display:none;}
.smallBtn{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
#audienceBox div {color:yellow;} /* make % yellow */
</style>

// ===== VARIABLES =====
let used=[], correctStreak=0, currentCorrect=0;
let time=30, timerInterval;
let lifelinesUsed={fifty:false,phone:false,audience:false};
let money=[];
for(let i=0;i<1000;i++){ money.push(i*50); }
let praise=["BRAVO","SUPERB","DIVINE","AMAZING","LEGENDARY","OUTSTANDING"];
let lastQuestion = null; // store question for ad continuation
let lastTime = 30;      // store remaining time for ad continuation

// ===== TIMER =====
function startTimer(){
clearInterval(timerInterval);
const c=document.getElementById("progressCircle");
const t=document.getElementById("timeText");
const r=25;
const circ=2*Math.PI*r;
c.style.strokeDasharray=circ;
c.style.strokeDashoffset=circ*(1-time/30);
c.style.stroke=(time<=10)?"red":"green";
t.innerText=time;
timerInterval=setInterval(()=>{
time--;
t.innerText=time;
c.style.strokeDashoffset=circ*(1-time/30);
c.style.stroke=(time<=10)?"red":"green";
if(time<=0){
clearInterval(timerInterval);
showGameOver();
}
},1000);
}

// ===== RANDOM QUESTION =====
function getQ(){
if(used.length===allQuestions.length) used=[];
let i; do{i=Math.floor(Math.random()*allQuestions.length);}while(used.includes(i));
used.push(i);
return allQuestions[i];
}

// ===== LOAD QUESTION =====
function loadQ(q=null){
let questionObj = q || getQ();
lastQuestion = questionObj;
document.getElementById("question").innerText = questionObj.q;
let opt = [...questionObj.a];
let correct = opt[questionObj.correct];
opt.sort(()=>Math.random()-0.5);
currentCorrect = opt.indexOf(correct);
for(let i=0;i<4;i++){
  let b=document.getElementById("a"+i);
  b.innerText=["A","B","C","D"][i]+": "+opt[i];
  b.style.display="block";
  b.style.color="white";
  b.style.background="#1c1c3c";
  b.disabled=false;
  b.onclick=()=>answer(i);
}
// Clear audience votes for new question
document.getElementById("audienceBox").innerHTML="";

// Reset timer if new question, else continue with lastTime
if(q===null){
  time=30;
}else{
  time=lastTime;
}
startTimer();
}

// ===== ANSWER =====
function answer(i){
clearInterval(timerInterval);
lastTime = 30; // reset countdown for next question
let btn=document.getElementById("a"+i);
btn.style.background="white";
btn.style.color="black";

if(i===currentCorrect){
correctStreak++;
showLadder();
if(correctStreak%10===0){
  let c=document.getElementById("celebration");
  c.innerText=praise[Math.floor(Math.random()*praise.length)];
  setTimeout(()=>c.innerText="",1500);
}
setTimeout(()=>{
  hideLadder();
  loadQ();
},1200);
}else{
document.getElementById("a"+currentCorrect).style.background="red";
setTimeout(showGameOver,1200);
}
}

// ===== LADDER =====
function showLadder(){
let box=document.getElementById("ladder");
box.innerHTML="";
let start=Math.max(0,correctStreak-5);
for(let i=start;i<=correctStreak;i++){
  let d=document.createElement("div");
  d.innerText="€"+money[i];
  if(i===correctStreak) d.classList.add("highlight");
  box.appendChild(d);
}
box.style.display="block";
}
function hideLadder(){document.getElementById("ladder").style.display="none";}

// ===== GAME OVER =====
function showGameOver(){
document.getElementById("finalScore").innerText="GAME OVER! You earned €"+money[correctStreak];
document.getElementById("gameOverBox").style.display="block";
}

// ===== RESTART =====
function restartGame(){
document.getElementById("gameOverBox").style.display="none";
correctStreak=0; 
used=[];
lifelinesUsed={fifty:false,phone:false,audience:false};
document.getElementById("fifty").classList.remove("used");
document.getElementById("phone").classList.remove("used");
document.getElementById("audience").classList.remove("used");
document.getElementById("audienceBox").innerHTML="";
loadQ();
}

// ===== EXIT =====
function exitGame(){document.body.innerHTML="<h1>Game Closed</h1>";}

// ===== CONTINUE AFTER AD =====
function continueAfterAd(){
  document.getElementById("gameOverBox").style.display="none";
  // Resume current question with last question object
  loadQ(lastQuestion);
}

// ===== WATCH AD INTEGRATION =====
function watchAd(){
    const adUnitId = "ca-app-pub-6336012570176626/9252660360"; // Replace with your key

    if(window.admob && admob.rewarded){
        admob.rewarded.show({
            adUnitId: adUnitId,
            onReward: function(reward){
                alert("Thanks for watching the ad! You can continue the game.");
                continueAfterAd();
            },
            onFail: function(err){
                alert("Ad failed to load. Game will continue anyway.");
                continueAfterAd();
            }
        });
    } else {
        alert("AdMob not available. Game will continue.");
        continueAfterAd();
    }
}

// ===== LIFELINES =====
function fifty(){
if(lifelinesUsed.fifty) return;
lifelinesUsed.fifty=true;
document.getElementById("fifty").classList.add("used");
let removed=0;
for(let i=0;i<4;i++){
  if(i!==currentCorrect && removed<2){
    document.getElementById("a"+i).style.display="none";
    removed++;
  }
}
}

function phone(){
if(lifelinesUsed.phone) return;
lifelinesUsed.phone=true;
document.getElementById("phone").classList.add("used");
alert("Friend suggests "+["A","B","C","D"][currentCorrect]);
}

function audience(){
if(lifelinesUsed.audience) return;
lifelinesUsed.audience=true;
document.getElementById("audience").classList.add("used");
let voteBox=document.getElementById("audienceBox");
voteBox.innerHTML="";
for(let i=0;i<4;i++){
  let percent=(i===currentCorrect)?60:Math.floor(Math.random()*30);
  let t=document.createElement("div");
  t.innerText=["A","B","C","D"][i]+" - "+percent+"%";
  voteBox.appendChild(t);
}
}

// ===== START GAME =====
loadQ();
</script>
