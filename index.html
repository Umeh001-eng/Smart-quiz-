  <style>
body {
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#000428,#004e92);
  color:white;
  text-align:center;
}

/* MAIN CONTAINER FIX */
.container {
  width:100%;
  max-width:600px;
  margin:auto;
  padding:15px;
  min-height:100vh; /* FULL SCREEN HEIGHT */
  box-sizing:border-box;
}

/* TIMER */
#timerBox{
  position:relative;
  margin:15px auto;
  width:60px;
  height:60px;
}

#timerBox svg{
  transform:rotate(-90deg);
}

#timeText{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
  font-size:16px;
}

/* QUESTION */
#question {
  font-size:18px;
  color:yellow;
  font-weight:600;
  margin:15px 0;
}

/* ANSWERS */
.answers button {
  width:100%; /* FULL WIDTH FIX */
  margin:8px 0;
  padding:12px;
  background:#1c1c3c;
  border:2px solid gold;
  border-radius:10px;
  color:white;
  cursor:pointer;
  text-align:left;
  font-size:15px;
}

/* LIFELINES */
.lifelines {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.lifelines button {
  width:45px;
  height:45px;
  border-radius:50%;
  margin:5px;
  border:none;
  background:white;
  cursor:pointer;
}

.used {
  background:gray !important;
  color:red !important;
}

/* LADDER (MAKE RESPONSIVE) */
#ladder {
  position:fixed;
  right:5px;
  top:50%;
  transform:translateY(-50%);
  background:black;
  padding:8px;
  border-radius:10px;
  display:none;
  font-size:12px;
  max-height:80vh;
  overflow-y:auto;
}

#ladder div {
  padding:4px;
}

.highlight {
  color:gold;
  font-weight:bold;
}

/* GAME OVER BOX */
#gameOverBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  padding:15px;
  border-radius:10px;
  display:none;
  width:90%;
  max-width:300px;
}

/* BUTTONS */
.smallBtn{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* CELEBRATION */
#celebration{
  font-size:24px;
  color:gold;
  margin-top:10px;
}

/* AUDIENCE TEXT */
#audienceBox div {
  color:yellow;
}

/* 🔥 MOBILE FIX */
@media (max-width: 480px) {
  #question {
    font-size:16px;
  }

  .answers button {
    font-size:14px;
    padding:10px;
  }

  #ladder {
    display:none; /* hide ladder on small screens */
  }
}
</style>

  <!-- ===== SOUND TOGGLE SWITCH ===== -->
<div style="position:fixed;top:10px;right:10px;z-index:999;">
  <label class="switch">
    <input type="checkbox" id="soundToggle" checked>
    <span class="slider round"></span>
  </label>
  <span style="color:white;font-family:Arial;font-weight:bold;margin-left:5px;"></span>
</div>

<style>
/* Toggle switch style */
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 28px;
}
.switch input {opacity: 0; width: 0; height: 0;}
.slider {
  position: absolute;
  cursor: pointer;
  top:0; left:0; right:0; bottom:0;
  background-color:#ccc;
  transition:0.4s;
  border-radius:34px;
}
.slider:before {
  position: absolute;
  content:"";
  height:22px; width:22px;
  left:3px; bottom:3px;
  background-color:white;
  transition:0.4s;
  border-radius:50%;
}
input:checked + .slider {background-color:#4caf50;}
input:checked + .slider:before {transform:translateX(22px);}
.slider.round {border-radius:34px;}
.slider.round:before {border-radius:50%;}
</style>

<!-- ===== SOUND SYSTEM ===== -->
<script>
// ===== LOAD YOUR MP3 FILES =====
const clickSound = new Audio("sounds/click.mp3");
const correctSound = new Audio("sounds/correct.mp3");
const wrongSound = new Audio("sounds/wrong.mp3");
const timerSound = new Audio("sounds/timer.mp3");
const lifelineSound = new Audio("sounds/lifeline.mp3");
const winSound = new Audio("sounds/win.mp3");
const newQuestionSound = new Audio("sounds/newquestion.mp3");

// ===== SETTINGS =====
clickSound.volume = 0.5;
correctSound.volume = 0.6;
wrongSound.volume = 0.6;
timerSound.volume = 0.3;
lifelineSound.volume = 0.6;
winSound.volume = 0.7;
newQuestionSound.volume = 0.5;

// ===== SOUND TOGGLE =====
let soundEnabled = true;
document.getElementById("soundToggle").addEventListener("change", function(){
  soundEnabled = this.checked;
  if(!soundEnabled){ stopTimerSound(); } // Stop timer immediately
});

// ===== HELPER FUNCTION =====
function playSound(audio){
  if(soundEnabled){
    audio.currentTime = 0;
    audio.play();
  }
}

// ===== CLICK SOUND =====
document.addEventListener("click", function(e){
  if(e.target.tagName === "BUTTON"){ playSound(clickSound); }
});

// ===== CORRECT / WRONG DETECTION =====
setInterval(()=>{
  document.querySelectorAll(".answers button").forEach(btn=>{
    if(btn.style.background.includes("green")){ playSound(correctSound); }
    if(btn.style.background.includes("red")){ playSound(wrongSound); }
  });
},300);

// ===== TIMER CONTROL =====
function startTimerSound(){
  if(soundEnabled){ timerSound.loop = true; timerSound.play(); }
}
function stopTimerSound(){ timerSound.pause(); timerSound.currentTime = 0; }

// ===== LIFELINE SOUND =====
function playLifelineSound(){ playSound(lifelineSound); }

// ===== WIN SOUND =====
setInterval(()=>{
  let c = document.getElementById("celebration");
  if(c && c.innerText.trim() !== ""){ playSound(winSound); }
},500);

// ===== NEW QUESTION SOUND =====
function playNewQuestionSound(){ playSound(newQuestionSound); }

// ===== INIT MOBILE FIX =====
document.body.addEventListener("click", function initSounds(){
  clickSound.play().then(()=>{ clickSound.pause(); clickSound.currentTime=0; });
  document.body.removeEventListener("click", initSounds);
});
</script>

c.style.stroke=(time<=10)?"red":"green";
t.innerText=time;
timerInterval=setInterval(()=>{
time--;
t.innerText=time;
c.style.strokeDashoffset=circ*(1-time/30);
c.style.stroke=(time<=10)?"red":"green";
if(time<=0){
clearInterval(timerInterval);
showGameOver();
}
startTimerSound();  
},1000);
}

// ===== RANDOM QUESTION =====
function getQ(){
if(used.length===allQuestions.length) used=[];
let i; do{i=Math.floor(Math.random()*allQuestions.length);}while(used.includes(i));
used.push(i);
return allQuestions[i];
}

// ===== LOAD QUESTION =====
function loadQ(q=null){
   playNewQuestionSound();
let questionObj = q || getQ();
lastQuestion = questionObj;
document.getElementById("question").innerText = questionObj.q;
let opt = [...questionObj.a];
let correct = opt[questionObj.correct];
opt.sort(()=>Math.random()-0.5);
currentCorrect = opt.indexOf(correct);
for(let i=0;i<4;i++){
  let b=document.getElementById("a"+i);
  b.innerText=["A","B","C","D"][i]+": "+opt[i];
  b.style.display="block";
  b.style.color="white";
  b.style.background="#1c1c3c";
  b.disabled=false;
  b.onclick=()=>answer(i);
}
// Clear audience votes for new question
document.getElementById("audienceBox").innerHTML="";

// Reset timer if new question, else continue with lastTime
if(q===null){
  time=30;
}else{
  time=lastTime;
}
startTimer();
}

// ===== ANSWER =====
function answer(i){
clearInterval(timerInterval);
lastTime = 30; // reset countdown for next question
let btn=document.getElementById("a"+i);
btn.style.background="white";
btn.style.color="black";

if(i===currentCorrect){
correctStreak++;
showLadder();
if(correctStreak%10===0){
  let c=document.getElementById("celebration");
  c.innerText=praise[Math.floor(Math.random()*praise.length)];
  setTimeout(()=>c.innerText="",1500);
}
setTimeout(()=>{
  hideLadder();
  loadQ();
},1200);
}else{
document.getElementById("a"+currentCorrect).style.background="red";
  clearInterval(timerInterval);
stopTimerSound();
setTimeout(showGameOver,1200);
}
}

// ===== LADDER =====
function showLadder(){
let box=document.getElementById("ladder");
box.innerHTML="";
let start=Math.max(0,correctStreak-5);
for(let i=start;i<=correctStreak;i++){
  let d=document.createElement("div");
  d.innerText="€"+money[i];
  if(i===correctStreak) d.classList.add("highlight");
  box.appendChild(d);
}
box.style.display="block";
}
function hideLadder(){document.getElementById("ladder").style.display="none";}

// ===== GAME OVER =====
function showGameOver(){
document.getElementById("finalScore").innerText="GAME OVER! You earned €"+money[correctStreak];
document.getElementById("gameOverBox").style.display="block";
}

// ===== RESTART =====
function restartGame(){
document.getElementById("gameOverBox").style.display="none";
correctStreak=0; 
used=[];
lifelinesUsed={fifty:false,phone:false,audience:false};
document.getElementById("fifty").classList.remove("used");
document.getElementById("phone").classList.remove("used");
document.getElementById("audience").classList.remove("used");
document.getElementById("audienceBox").innerHTML="";
loadQ();
}

 function exitGame() {

        <button id="yesExit" style="
          margin:10px;
          padding:10px 20px;
          background:red;
          color:white;
          border:none;
          border-radius:6px;">
          Yes
        </button>
        
        <button id="noExit" style="
          margin:10px;
          padding:10px 20px;
          background:gray;
          color:white;
          border:none;
          border-radius:6px;">
          No
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(box);

  // Function to remove popup
  function closePopup() {
    const popup = document.getElementById("exitPopup");
    if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
  }

  // Function to handle exit
  function handleExit() {
    try {
      // AppCreator / Cordova environment
      if (navigator.app && navigator.app.exitApp) {
        navigator.app.exitApp();
        return;
      } else if (navigator.device && navigator.device.exitApp) {
        navigator.device.exitApp();
        return;
      }

      // Browser fallback
      document.body.innerHTML =
        "<h1 style='color:white;text-align:center;margin-top:50%;'>" +
        "Thanks for playing SMART QUIZ<br>Press back button to exit</h1>";
    } catch (e) {
      document.body.innerHTML =
        "<h1 style='color:white;text-align:center;margin-top:50%;'>" +
        "Thanks for playing SMART QUIZ</h1>";
    }
  }

  // YES = exit
  document.getElementById("yesExit").onclick = function () {
    closePopup();
    setTimeout(handleExit, 200); // small delay to ensure popup is removed first
  };

  // NO = just close popup
  document.getElementById("noExit").onclick = function () {
    closePopup();
  };
}
  

// ===== CONTINUE AFTER AD =====
function continueAfterAd(){
  document.getElementById("gameOverBox").style.display="none";
  // Resume current question with last question object
  loadQ(lastQuestion);
}

// ===== LIFELINES =====
function fifty(){
if(lifelinesUsed.fifty) return;
lifelinesUsed.fifty=true;
document.getElementById("fifty").classList.add("used");
  playLifelineSound();
let removed=0;
for(let i=0;i<4;i++){
  if(i!==currentCorrect && removed<2){
    document.getElementById("a"+i).style.display="none";
    removed++;
  }
}
}


  function phone() {
  // Prevent reuse
  if (lifelinesUsed.phone) return;
  lifelinesUsed.phone = true;
  document.getElementById("phone").classList.add("used");

    playLifelineSound();
  // Friend suggestion logic: 95% correct, 5% random wrong
  const options = ["A", "B", "C", "D"];
  let suggestion;
  if (Math.random() < 0.95) {
    suggestion = options[currentCorrect]; // correct
  } else {
    // Pick a random wrong answer
    let wrongOptions = options.filter((_, i) => i !== currentCorrect);
    suggestion = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
  }

  // Display suggestion on the game panel
  let friendBox = document.getElementById("friendPopup");
  if (!friendBox) {
    // create the box if it doesn't exist
    friendBox = document.createElement("div");
    friendBox.id = "friendPopup";
    friendBox.style.position = "absolute";
    friendBox.style.bottom = "120px";
    friendBox.style.left = "50%";
    friendBox.style.transform = "translateX(-50%)";
    friendBox.style.background = "#1e1e2f";
    friendBox.style.color = "white";
    friendBox.style.padding = "15px 25px";
    friendBox.style.borderRadius = "10px";
    friendBox.style.fontSize = "18px";
    friendBox.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
    friendBox.style.pointerEvents = "none"; // <-- Important: allows button clicks
    document.body.appendChild(friendBox);
  }

  // Set the suggestion text
  friendBox.innerHTML = `🤔 Your friend thinks the answer is <strong>${suggestion}</strong>`;
  friendBox.style.opacity = 1;

  // Hide it after 3 seconds
  setTimeout(() => {
    friendBox.style.opacity = 0;
  }, 3000);
}
  
  

function audience(){
if(lifelinesUsed.audience) return;
lifelinesUsed.audience=true;
document.getElementById("audience").classList.add("used");
  playLifelineSound();
let voteBox=document.getElementById("audienceBox");
voteBox.innerHTML="";
for(let i=0;i<4;i++){
  let percent=(i===currentCorrect)?60:Math.floor(Math.random()*30);
  let t=document.createElement("div");
  t.innerText=["A","B","C","D"][i]+" - "+percent+"%";

}
}
